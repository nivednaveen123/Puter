<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Opus · Claude 4.7</title>
<script src="https://js.puter.com/v2/"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080d;--surface:#0d0f17;--surface2:#12151f;
  --border:#1c1f2e;--border2:#252840;
  --accent:#e8c47a;--accent2:#7ab8e8;--accent3:#e87ab8;
  --green:#5dcea0;--text:#eceaf4;--muted:#4a4d6a;--muted2:#6b6f8f;
  --red:#e87a7a;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;overflow:hidden}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%,rgba(232,196,122,0.07) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 85% 100%,rgba(122,184,232,0.06) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 50% 50%,rgba(232,122,184,0.03) 0%,transparent 60%);
}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:820px;margin:0 auto}

/* HEADER */
header{
  padding:14px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  backdrop-filter:blur(12px);background:rgba(7,8,13,0.85);
}
.logo{font-family:'Instrument Serif',serif;font-size:26px;color:var(--accent);letter-spacing:0.03em}
.model-pill{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted2);border:1px solid var(--border2);padding:3px 9px;border-radius:20px}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.status-badge{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--green);letter-spacing:0.08em}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:breathe 2s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:0.35}}
#clear-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:10px;letter-spacing:0.1em;padding:5px 10px;border-radius:6px;cursor:pointer;transition:all .2s}
#clear-btn:hover{border-color:var(--red);color:var(--red)}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Welcome */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px;flex:1;padding:40px 20px;min-height:60vh}
.big{font-family:'Instrument Serif',serif;font-size:52px;color:var(--accent);font-style:italic;line-height:1}
.sub{color:var(--muted2);font-size:11px;letter-spacing:0.14em;text-transform:uppercase}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.chip{background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);font-family:'Syne',sans-serif;font-size:11px;padding:8px 15px;border-radius:20px;cursor:pointer;transition:all .2s;letter-spacing:0.04em}
.chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(232,196,122,0.06)}

/* Bubbles */
.msg{display:flex;gap:12px;animation:pop .25s ease forwards;opacity:0}
@keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;align-self:flex-end}
.msg.user .avatar{background:linear-gradient(135deg,var(--accent),#c8a060);color:#000}
.msg.assistant .avatar{background:linear-gradient(135deg,var(--accent2),#5090c8);color:#000;font-size:16px}
.bubble{max-width:75%;padding:14px 16px;border-radius:16px;font-family:'Instrument Serif',serif;font-size:17px;line-height:1.75;word-break:break-word}
.msg.user .bubble{background:#151829;border:1px solid var(--border2);border-bottom-right-radius:4px;font-style:italic;color:#ccc6e0}
.msg.assistant .bubble{background:#0e1020;border:1px solid var(--border);border-bottom-left-radius:4px}

/* Type badges */
.type-badge{display:inline-flex;align-items:center;gap:4px;font-family:'Syne',sans-serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:2px 7px;border-radius:10px;margin-bottom:8px}
.badge-img{background:rgba(93,206,160,0.12);color:var(--green);border:1px solid rgba(93,206,160,0.25)}
.badge-file{background:rgba(122,184,232,0.12);color:var(--accent2);border:1px solid rgba(122,184,232,0.25)}
.badge-voice{background:rgba(232,122,184,0.12);color:var(--accent3);border:1px solid rgba(232,122,184,0.25)}

/* Image & file in bubble */
.msg-image{max-width:100%;max-height:280px;border-radius:10px;display:block;margin-bottom:10px;object-fit:cover;border:1px solid var(--border2)}
.file-preview{display:flex;align-items:center;gap:10px;background:rgba(122,184,232,0.07);border:1px solid rgba(122,184,232,0.2);border-radius:10px;padding:10px 14px;margin-bottom:8px}
.file-preview .fname{font-family:'Syne',sans-serif;font-size:12px;color:var(--accent2);font-weight:500}
.file-preview .fsize{font-family:'Syne',sans-serif;font-size:10px;color:var(--muted2);margin-top:2px}

/* Cursor */
.cursor{display:inline-block;width:2px;height:1em;background:var(--accent2);margin-left:2px;vertical-align:text-bottom;animation:blink .7s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Option buttons */
.opt-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.opt-btn{background:none;border:1px solid var(--border2);color:var(--muted2);font-family:'Syne',sans-serif;font-size:11px;letter-spacing:0.05em;padding:7px 14px;border-radius:20px;cursor:pointer;transition:all .2s;text-align:left}
.opt-btn:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(122,184,232,0.08)}

/* VOICE INDICATOR */
#voice-bar{display:none;align-items:center;gap:10px;padding:10px 20px 6px}
#voice-bar.active{display:flex}
.waves{display:flex;align-items:center;gap:3px;height:22px}
.w{width:3px;border-radius:2px;background:var(--accent3);animation:wv .7s ease-in-out infinite}
.w:nth-child(1){height:6px;animation-delay:.0s}
.w:nth-child(2){height:14px;animation-delay:.1s}
.w:nth-child(3){height:10px;animation-delay:.2s}
.w:nth-child(4){height:18px;animation-delay:.3s}
.w:nth-child(5){height:8px;animation-delay:.4s}
.w:nth-child(6){height:14px;animation-delay:.5s}
@keyframes wv{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.25)}}
#voice-label{font-size:12px;color:var(--accent3);letter-spacing:.07em}
#voice-timer{margin-left:auto;font-size:11px;color:var(--muted2)}
.stop-voice-btn{background:rgba(232,122,184,0.15);border:1px solid rgba(232,122,184,0.4);color:var(--accent3);font-family:'Syne',sans-serif;font-size:10px;padding:4px 10px;border-radius:6px;cursor:pointer;transition:all .2s}
.stop-voice-btn:hover{background:rgba(232,122,184,0.25)}

/* ATTACH PREVIEW */
#attach-bar{display:none;flex-wrap:wrap;gap:8px;padding:10px 20px 0}
#attach-bar.has{display:flex}
.athumb{position:relative;flex-shrink:0}
.athumb img{width:58px;height:58px;object-fit:cover;border-radius:8px;border:1px solid var(--border2);display:block}
.afile{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:6px 10px;height:58px;max-width:150px}
.afile span{font-size:10px;color:var(--accent2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.rm{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--red);border-radius:50%;border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* FOOTER */
footer{flex-shrink:0;background:rgba(7,8,13,0.88);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:10px 20px 18px}
.toolbar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.tbtn{background:none;border:1px solid var(--border);color:var(--muted2);width:36px;height:36px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s;flex-shrink:0}
.tbtn:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.tbtn.on{border-color:var(--accent);color:var(--accent);background:rgba(232,196,122,0.1)}
.tbtn.voice-on{border-color:var(--accent3);color:var(--accent3);background:rgba(232,122,184,0.12);animation:vp 1s ease-in-out infinite}
@keyframes vp{0%,100%{box-shadow:0 0 0 0 rgba(232,122,184,.4)}50%{box-shadow:0 0 0 8px rgba(232,122,184,0)}}
.tbtn.tts-on{border-color:var(--green);color:var(--green);background:rgba(93,206,160,0.1)}
.tbtn.opt-on{border-color:var(--accent2);color:var(--accent2);background:rgba(122,184,232,0.1)}
.tsep{width:1px;height:22px;background:var(--border);margin:0 2px;flex-shrink:0}
.tlabel{font-size:10px;color:var(--muted);letter-spacing:.08em;margin-left:4px}

.input-row{display:flex;align-items:flex-end;gap:10px;background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:10px 12px;transition:border-color .2s}
.input-row:focus-within{border-color:var(--accent)}
#input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Instrument Serif',serif;font-size:17px;line-height:1.5;resize:none;max-height:140px;min-height:26px}
#input::placeholder{color:var(--muted);font-style:italic}
#send-btn{background:linear-gradient(135deg,var(--accent),#c8a060);border:none;color:#000;width:38px;height:38px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:17px;font-weight:700}
#send-btn:hover:not(:disabled){transform:scale(1.06);box-shadow:0 4px 20px rgba(232,196,122,.35)}
#send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.hint{margin-top:8px;text-align:center;font-size:10px;color:var(--muted);letter-spacing:.06em}

@media(max-width:600px){
  header{padding:10px 14px}
  #messages{padding:12px 12px}
  footer{padding:8px 14px 16px}
  .bubble{max-width:86%;font-size:16px}
  .big{font-size:38px}
}
</style>
</head>
<body>
<div id="app">

<header>
  <span class="logo">Opus</span>
  <span class="model-pill">claude-opus-4-7</span>
  <div class="header-right">
    <div class="status-badge"><div class="dot"></div>puter.js</div>
    <button id="clear-btn" onclick="clearChat()">✕ clear</button>
  </div>
</header>

<div id="messages">
  <div id="welcome">
    <div class="big">Hello.</div>
    <div class="sub">Claude Opus 4.7 · Puter.js · No API key</div>
    <div class="chips">
      <button class="chip" onclick="useChip(this)">✍️ Write me a story</button>
      <button class="chip" onclick="useChip(this)">🧠 Explain quantum physics</button>
      <button class="chip" onclick="useChip(this)">💡 Give me startup ideas</button>
      <button class="chip" onclick="useChip(this)">🎨 Describe an image</button>
      <button class="chip" onclick="useChip(this)">🔧 Debug my code</button>
    </div>
  </div>
</div>

<!-- VOICE BAR -->
<div id="voice-bar">
  <div class="waves"><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div></div>
  <span id="voice-label">Listening…</span>
  <span id="voice-timer">0:00</span>
  <button class="stop-voice-btn" onclick="stopVoice()">■ Stop</button>
</div>

<!-- ATTACH PREVIEW -->
<div id="attach-bar"></div>

<footer>
  <div class="toolbar">
    <!-- Images -->
    <button class="tbtn" onclick="document.getElementById('img-in').click()" title="Upload image">🖼️</button>
    <input type="file" id="img-in" accept="image/*" multiple style="display:none" onchange="handleImg(event)"/>

    <!-- Files -->
    <button class="tbtn" onclick="document.getElementById('file-in').click()" title="Upload file">📎</button>
    <input type="file" id="file-in" accept=".pdf,.txt,.csv,.json,.md,.docx" multiple style="display:none" onchange="handleFile(event)"/>

    <div class="tsep"></div>

    <!-- Voice input -->
    <button class="tbtn" id="voice-btn" onclick="toggleVoice()" title="Voice typing">🎤</button>
    <span class="tlabel" id="voice-lbl">voice</span>

    <!-- TTS -->
    <button class="tbtn" id="tts-btn" onclick="toggleTTS()" title="Speak responses">🔊</button>
    <span class="tlabel" id="tts-lbl">speak</span>

    <div class="tsep"></div>

    <!-- Options mode -->
    <button class="tbtn" id="opt-btn" onclick="toggleOpts()" title="Show reply options">⚡</button>
    <span class="tlabel" id="opt-lbl">options</span>
  </div>

  <div class="input-row">
    <textarea id="input" placeholder="Ask anything…" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
  <div class="hint">Enter · send &nbsp;|&nbsp; Shift+Enter · new line &nbsp;|&nbsp; 🖼️ images &nbsp;|&nbsp; 📎 files &nbsp;|&nbsp; 🎤 voice &nbsp;|&nbsp; 🔊 TTS &nbsp;|&nbsp; ⚡ options</div>
</footer>
</div>

<script>
/* ── STATE ── */
const msgsEl   = document.getElementById('messages');
const inputEl  = document.getElementById('input');
const sendBtn  = document.getElementById('send-btn');
const voiceBar = document.getElementById('voice-bar');
const attachBar= document.getElementById('attach-bar');

let history      = [];
let isStreaming  = false;
let ttsOn        = false;
let optsOn       = false;
let attachments  = [];
let recognition  = null;
let isRecording  = false;
let vtimer       = null;
let vsec         = 0;
let wasVoice     = false;

/* ── AUTO RESIZE ── */
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!isStreaming) sendMessage(); }
});

/* ── CHIPS ── */
function useChip(btn) {
  const txt = btn.textContent.replace(/^[\u{1F000}-\u{1FFFF}\u2600-\u27FF]\uFE0F?\s/u,'').replace(/^.{1,2}\s/,'');
  inputEl.value = txt;
  inputEl.dispatchEvent(new Event('input'));
  sendMessage();
}

/* ── IMAGE UPLOAD ── */
function handleImg(e) {
  Array.from(e.target.files).forEach(f => {
    const r = new FileReader();
    r.onload = ev => { attachments.push({type:'image',name:f.name,size:f.size,dataUrl:ev.target.result,mime:f.type}); renderAttach(); };
    r.readAsDataURL(f);
  });
  e.target.value='';
}

/* ── FILE UPLOAD ── */
function handleFile(e) {
  Array.from(e.target.files).forEach(f => {
    const r = new FileReader();
    r.onload = ev => { attachments.push({type:'file',name:f.name,size:f.size,dataUrl:ev.target.result,mime:f.type}); renderAttach(); };
    r.readAsDataURL(f);
  });
  e.target.value='';
}

function renderAttach() {
  if (!attachments.length) { attachBar.className=''; attachBar.innerHTML=''; return; }
  attachBar.className='has';
  attachBar.innerHTML = attachments.map((a,i) => {
    if (a.type==='image') return `<div class="athumb"><img src="${a.dataUrl}" alt="${esc(a.name)}"/><button class="rm" onclick="rmAttach(${i})">✕</button></div>`;
    return `<div class="athumb"><div class="afile"><span style="font-size:20px">📄</span><span>${esc(a.name)}</span></div><button class="rm" onclick="rmAttach(${i})">✕</button></div>`;
  }).join('');
}
function rmAttach(i) { attachments.splice(i,1); renderAttach(); }

/* ── VOICE INPUT ── */
function toggleVoice() {
  if (isRecording) { stopVoice(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice input not supported. Please use Chrome or Edge.'); return; }
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  let base = inputEl.value;
  recognition.onresult = e => {
    let interim='', fin='';
    for (let i=e.resultIndex;i<e.results.length;i++) {
      if (e.results[i].isFinal) fin += e.results[i][0].transcript+' ';
      else interim += e.results[i][0].transcript;
    }
    if (fin) base += fin;
    inputEl.value = base+interim;
    inputEl.dispatchEvent(new Event('input'));
  };
  recognition.onerror = ()=>stopVoice();
  recognition.onend = ()=>{ if(isRecording) recognition.start(); };
  recognition.start();
  isRecording=true; wasVoice=true;
  document.getElementById('voice-btn').classList.add('voice-on');
  voiceBar.classList.add('active');
  vsec=0;
  vtimer = setInterval(()=>{ vsec++; const m=Math.floor(vsec/60),s=(vsec%60).toString().padStart(2,'0'); document.getElementById('voice-timer').textContent=`${m}:${s}`; },1000);
}
function stopVoice() {
  if (recognition) { recognition.onend=null; recognition.stop(); recognition=null; }
  isRecording=false;
  document.getElementById('voice-btn').classList.remove('voice-on');
  voiceBar.classList.remove('active');
  clearInterval(vtimer);
}

/* ── TTS ── */
function toggleTTS() {
  ttsOn=!ttsOn;
  const btn=document.getElementById('tts-btn');
  btn.classList.toggle('tts-on',ttsOn);
  document.getElementById('tts-lbl').style.color=ttsOn?'var(--green)':'';
}
function speak(text) {
  if (!ttsOn||!text) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text.replace(/<[^>]+>/g,''));
  u.rate=1.05;
  window.speechSynthesis.speak(u);
}

/* ── OPTIONS MODE ── */
function toggleOpts() {
  optsOn=!optsOn;
  document.getElementById('opt-btn').classList.toggle('opt-on',optsOn);
  document.getElementById('opt-lbl').style.color=optsOn?'var(--accent2)':'';
}

/* ── SEND ── */
async function sendMessage() {
  const text = inputEl.value.trim();
  if ((!text && !attachments.length)||isStreaming) return;
  if (isRecording) stopVoice();

  isStreaming=true; sendBtn.disabled=true;
  const curAttach=[...attachments]; attachments=[]; renderAttach();
  const usedVoice=wasVoice; wasVoice=false;
  inputEl.value=''; inputEl.style.height='auto';

  /* Build user bubble HTML */
  let bubbleHTML='';
  const imgs=curAttach.filter(a=>a.type==='image');
  const files=curAttach.filter(a=>a.type==='file');
  if (usedVoice) bubbleHTML+=`<div class="type-badge badge-voice">🎤 voice</div>`;
  else if (imgs.length) bubbleHTML+=`<div class="type-badge badge-img">🖼️ image</div>`;
  else if (files.length) bubbleHTML+=`<div class="type-badge badge-file">📎 file</div>`;
  imgs.forEach(a=>{ bubbleHTML+=`<img class="msg-image" src="${a.dataUrl}" alt="${esc(a.name)}"/>`; });
  files.forEach(a=>{ const kb=(a.size/1024).toFixed(1); bubbleHTML+=`<div class="file-preview"><span style="font-size:22px">📄</span><div><div class="fname">${esc(a.name)}</div><div class="fsize">${kb} KB</div></div></div>`; });
  if (text) bubbleHTML+=`<div>${esc(text)}</div>`;
  appendMsg('user', bubbleHTML);

  /* Build API content */
  let apiContent=[];
  imgs.forEach(a=>{ apiContent.push({type:'image_url',image_url:{url:a.dataUrl}}); });
  files.forEach(a=>{ try { const decoded=atob(a.dataUrl.split(',')[1]); apiContent.push({type:'text',text:`[File: ${a.name}]\n${decoded.substring(0,4000)}`}); } catch{} });
  let msgText=text;
  if (optsOn) msgText+=(msgText?'\n\n':'')+`After your response, provide 3-4 short follow-up options the user can tap. Format them exactly as:\nOPTIONS:\n• option one\n• option two\n• option three`;
  if (msgText) apiContent.push({type:'text',text:msgText});
  if (!apiContent.length) apiContent=[{type:'text',text:''}];

  history.push({role:'user', content: apiContent.length===1&&apiContent[0].type==='text' ? apiContent[0].text : apiContent});

  /* AI bubble */
  const aiBubble=appendMsg('assistant','');
  const cursor=document.createElement('span'); cursor.className='cursor'; aiBubble.appendChild(cursor);
  let full='';

  try {
    const resp=await puter.ai.chat(history,{model:'claude-opus-4-7',stream:true});
    for await (const part of resp) {
      if (part?.text) { full+=part.text; aiBubble.innerHTML=fmtText(full); aiBubble.appendChild(cursor); msgsEl.scrollTop=msgsEl.scrollHeight; }
    }
    cursor.remove();
    aiBubble.innerHTML=fmtText(full);
    if (optsOn) renderOpts(aiBubble, full);
    history.push({role:'assistant',content:full});
    speak(full);
  } catch(err) {
    cursor.remove();
    aiBubble.innerHTML=`<span style="color:var(--red)">⚠ ${esc(err.message||'Something went wrong')}</span>`;
  }

  isStreaming=false; sendBtn.disabled=false; inputEl.focus();
}

/* ── RENDER OPTIONS ── */
function renderOpts(container, text) {
  const m=text.match(/OPTIONS:\s*([\s\S]+?)(?:\n\n|$)/i);
  if (!m) return;
  const opts=m[1].split('\n').map(l=>l.replace(/^[•\-\*]\s*/,'')).filter(Boolean);
  if (!opts.length) return;
  const wrap=document.createElement('div'); wrap.className='opt-btns';
  opts.forEach(o=>{ const b=document.createElement('button'); b.className='opt-btn'; b.textContent=o; b.onclick=()=>{ inputEl.value=o; inputEl.dispatchEvent(new Event('input')); sendMessage(); }; wrap.appendChild(b); });
  container.appendChild(wrap);
}

/* ── APPEND MSG ── */
function appendMsg(role, html) {
  const welcome=document.getElementById('welcome'); if(welcome) welcome.remove();
  const msg=document.createElement('div'); msg.className=`msg ${role}`;
  const av=document.createElement('div'); av.className='avatar'; av.textContent=role==='user'?'YOU':'✦';
  const bub=document.createElement('div'); bub.className='bubble'; bub.innerHTML=html;
  if (role==='user'){msg.appendChild(bub);msg.appendChild(av);}
  else{msg.appendChild(av);msg.appendChild(bub);}
  msgsEl.appendChild(msg); msgsEl.scrollTop=msgsEl.scrollHeight;
  return bub;
}

/* ── CLEAR ── */
function clearChat() {
  history=[]; attachments=[]; renderAttach();
  window.speechSynthesis?.cancel();
  msgsEl.innerHTML=`<div id="welcome">
    <div class="big">Hello.</div>
    <div class="sub">Claude Opus 4.7 · Puter.js · No API key</div>
    <div class="chips">
      <button class="chip" onclick="useChip(this)">✍️ Write me a story</button>
      <button class="chip" onclick="useChip(this)">🧠 Explain quantum physics</button>
      <button class="chip" onclick="useChip(this)">💡 Give me startup ideas</button>
      <button class="chip" onclick="useChip(this)">🎨 Describe an image</button>
      <button class="chip" onclick="useChip(this)">🔧 Debug my code</button>
    </div>
  </div>`;
}

/* ── HELPERS ── */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtText(t) {
  return esc(t)
    .replace(/```([\s\S]*?)```/g,'<pre style="background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:8px;padding:12px;font-size:13px;font-family:monospace;overflow-x:auto;margin:8px 0;white-space:pre-wrap">$1</pre>')
    .replace(/`([^`]+)`/g,'<code style="font-family:monospace;font-size:.82em;background:rgba(255,255,255,0.07);padding:2px 6px;border-radius:4px">$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
    .replace(/^#{1,3}\s(.+)$/gm,'<strong style="font-size:1.05em;display:block;margin:8px 0 4px">$1</strong>')
    .replace(/^[•\-]\s(.+)$/gm,'<div style="padding-left:14px;margin:2px 0">• $1</div>')
    .replace(/OPTIONS:\s*([\s\S]+?)(?=\n\n|$)/gi,'<span style="display:none">$&</span>')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>');
}
